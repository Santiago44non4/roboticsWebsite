    <body>
        <div id="shared-header"></div>
        <script>
            function normalizeImagePath(src) {
                if (!src) return "";
                if (src.startsWith("http://") || src.startsWith("https://")) return src;
                if (src.startsWith("/")) return src;
                return "/src/" + src.replace(/^\/+/, "");
            }

            function formatLabel(text) {
                return text ? text.replace(/_/g, " ") : "";
            }

            function renderFallback(message) {
                const title = document.querySelector("header h1.title");
                if (title) title.textContent = "Robot profile unavailable";
                const description = document.getElementById("robotSubTitle");
                if (description)
                    description.textContent = message ||
                        "No robot data could be loaded. Please check the URL.";
                document.getElementById("statsGrid").innerHTML = "";
                document.getElementById("stackCards").innerHTML = "";
                document.getElementById("timelineList").innerHTML = "";
                document.getElementById("galleryGrid").innerHTML = "";
            }

            function loadHeader(robot) {
                const headerContainer = document.getElementById("shared-header");
                if (!headerContainer) return;
                const parallax = headerContainer.querySelector(".parallax");
                const title = headerContainer.querySelector(".title");
                if (title) title.textContent = robot.heroTitle || robot.name || "Robot Profile";
                const heroImage = normalizeImagePath(robot.image || robot.gallery?.[0]?.src);
                if (parallax && heroImage) {
                    parallax.style.backgroundImage = `linear-gradient(rgba(17, 17, 17, 0.88), rgba(17, 17, 17, 0.36)), url('${heroImage}')`;
                }
            }

            window.addEventListener("DOMContentLoaded", function () {
                fetch("/src/header.html")
                    .then((r) => r.text())
                    .then((html) => {
                        document.getElementById("shared-header").innerHTML = html;
                        const btn = document.querySelector(".shared-cta");
                        if (btn) {
                            btn.textContent = "Home";
                            btn.onclick = () => (location.href = "/index.html");
                        }
                        const fadeIn = {
                            items: [],
                            add(element) {
                                if (!element) return;
                                element.classList.add("fade-ready");
                                this.items.push(element);
                            },
                            check() {
                                const viewport = window.innerHeight;
                                this.items.forEach((element) => {
                                    if (element.classList.contains("fade-visible")) return;
                                    const rect = element.getBoundingClientRect();
                                    if (rect.top < viewport - 80) {
                                        void element.offsetWidth;
                                        element.classList.add("fade-visible");
                                    }
                                });
                            },
                            init() {
                                window.addEventListener("scroll", () => this.check(), { passive: true });
                                window.addEventListener("resize", () => this.check());
                            },
                        };
                        fadeIn.init();
                        const params = new URLSearchParams(window.location.search);
                        const botKey = params.get("bot");
                        if (!botKey) {
                            renderFallback("Missing ?bot= parameter in the URL.");
                            return;
                        }
                        const robotPaths = [`/src/${botKey}.json`, `${botKey}.json`];
                        function loadRobotProfile(index) {
                            if (index >= robotPaths.length) {
                                return Promise.reject(new Error("Robot JSON not found."));
                            }
                            return fetch(robotPaths[index], { cache: "no-store" }).then(
                                (resp) => {
                                    if (!resp.ok) {
                                        return loadRobotProfile(index + 1);
                                    }
                                    return resp.json();
                                },
                            );
                        }

                        loadRobotProfile(0)
                            .then((robot) => {
                                if (!robot || !robot.name) {
                                    throw new Error("Robot JSON not found.");
                                }
                                document.title = `${robot.heroTitle || robot.name} | Blender Bots`;
                                loadHeader(robot);
                                document.getElementById("robotName").textContent = robot.heroTitle || robot.name || "Robot";
                                document.getElementById("robotSubTitle").textContent = robot.description || "";
                                                const robotImageEl = document.getElementById("robotImage");
                                if (robotImageEl) {
                                    robotImageEl.src = normalizeImagePath(robot.image || robot.gallery?.[0]?.src || "");
                                    robotImageEl.alt = robot.heroTitle || robot.name || "Robot image";
                                }
                                const statsGrid = document.getElementById("statsGrid");
                                statsGrid.innerHTML = "";
                                (robot.stats || []).forEach((stat) => {
                                    const card = document.createElement("div");
                                    card.className = "stat-card fade-ready";
                                    card.innerHTML = `<span class="stat-label">${stat.label}</span><span class="stat-value">${stat.value}</span>`;
                                    statsGrid.appendChild(card);
                                    fadeIn.add(card);
                                });
                                const stackCards = document.getElementById("stackCards");
                                stackCards.innerHTML = "";
                                (robot.stack || []).forEach((item) => {
                                    const card = document.createElement("div");
                                    card.className = "card fade-ready";
                                    card.innerHTML = `<h3>${item.title}</h3><p>${item.body}</p>`;
                                    stackCards.appendChild(card);
                                    fadeIn.add(card);
                                });
                                const timelineList = document.getElementById("timelineList");
                                timelineList.innerHTML = "";
                                (robot.timeline || []).forEach((entry) => {
                                    const card = document.createElement("div");
                                    card.className = "roadmap-card fade-ready";
                                    card.innerHTML = `<div class="roadmap-step"><strong>${entry.year} · ${entry.title}</strong><p>${entry.detail || "No detail provided."}</p></div>`;
                                    timelineList.appendChild(card);
                                    fadeIn.add(card);
                                });
                                const galleryGrid = document.getElementById("galleryGrid");
                                galleryGrid.innerHTML = "";
                                (robot.gallery || []).forEach((image) => {
                                    const figure = document.createElement("figure");
                                    figure.className = "gallery-card fade-ready";
                                    figure.innerHTML = `<img src="${normalizeImagePath(image.src)}" alt="${image.alt || robot.heroTitle || robot.name}" /><figcaption class="gallery-caption">${image.alt || "Robot image"}</figcaption>`;
                                    galleryGrid.appendChild(figure);
                                    fadeIn.add(figure);
                                });
                                requestAnimationFrame(() => fadeIn.check());
                            })
                            .catch((error) => {
                                renderFallback(error.message);
                            });
                    });
            });
        </script>
